<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ user.name }} - Flask Demo</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 900px; margin: 50px auto; padding: 20px; }
        h1 { color: #333; }
        .nav { margin: 20px 0; padding: 15px; background: #f5f5f5; border-radius: 8px; }
        .nav a { margin: 0 15px; text-decoration: none; color: #007bff; }
        .card { border: 1px solid #ddd; border-radius: 8px; padding: 20px; margin: 15px 0; }
        .meta { color: #666; font-size: 0.9em; }
        .back { margin-top: 20px; }
    </style>
</head>
<body>
    <h1>{{ user.name }}</h1>
    <nav class="nav">
        <a href="/">Home</a>
        <a href="/users">Users</a>
        <a href="/about">About</a>
    </nav>
    <div class="card">
        <p><strong>Email:</strong> {{ user.email }}</p>
        <p class="meta">Joined: {{ user.created_at }}</p>
    </div>
    
    <h2>Posts by {{ user.name }}</h2>
    {% for post in posts %}
    <div class="card">
        <h3>{{ post.title }}</h3>
        <p class="meta">{{ post.created_at }}</p>
        <p>{{ post.content }}</p>
    </div>
    {% endfor %}
    
    <div class="back">
        <a href="/users">Back to Users</a>
    </div>
</body>
</html>
